kind = "web"
previewPath = "/"
title = "From The Ground Up"
version = "1.0.0"
id = "artifacts/from-the-ground-up"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20441

[services.development]
run = "pnpm --filter @workspace/from-the-ground-up run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/from-the-ground-up", "run", "build" ]
publicDir = "artifacts/from-the-ground-up/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20441"
BASE_PATH = "/"
